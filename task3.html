<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Data</title>
    <link rel="stylesheet" href="task3.css">
</head>

<body>
    <h1>Personal Info</h1>
    <div class="body">
        <div id="info">
        <form>
            
            <label class="data">Name</label><input type="text" id="name">
            <br>
            <label class="data">Gender</label>
            <input type="radio" id="male" name="gender" value="male"><label
                for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female"><label for="female">Female</label>
            <input type="radio" id="trans" name="gender" value="transgender"><label
                for="transgender">Transgender</label>
            <br>
            <label class="data">Education</label>
            <input type="checkbox" id="hsc" name="edu1" value="hsc"><label for="hsc">HSC</label>
            <input type="checkbox" id="sslc" name="edu2" value="sslc"><label for="sslc">SSLC</label>
            <input type="checkbox" id="be" name="edu3" value="BE"><label for="hsc">BE</label>
            <input type="checkbox" id="bcom" name="edu4" value="bcom"><label for="hsc">Bcom</label>
            <br>
            <input type="submit" id="s_button"> <input type="reset" id="r_button">
        </form>
    </div>
    </div>
    
</body>

</html>
