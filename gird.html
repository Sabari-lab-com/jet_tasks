<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .layout{
            display: grid;
            grid-template-columns: repeat(3,minmax(200px,250px));
            gap: 20px;
            grid-row:1;
        }
        div .hello{
            display: grid;
            justify-content: center;
            align-items: center;
            background-color: rgb(43, 0, 255);
        }
        div {
            display: grid;
            justify-content: center;
            align-items: center;
            border: 1px solid black;
        }
        div .one{
            display: grid;
            justify-content: center;
            align-items: center;
            background-color: rgb(242, 0, 255);
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="one">1</div>
        <div class="hello">2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </div>
</body>
</html>
